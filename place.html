<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria</title>
    <link rel="stylesheet" href="/styles/place.css">
</head>

<body>
    <header>
        <h1>Nigeria</h1>
    </header>
    <main>
        <section class="hero">
            <picture>
                <source srcset="images/nigeria-hero-400.webp" media="(max-width: 400px)">
                <source srcset="images/nigeria-hero-800.webp" media="(max-width: 800px)">
                <img src="images/nigeria-hero-1200.webp" alt="Nigeria Hero Image">
            </picture>
            <div class="cards-container">
                <div class="card left-card move-left">
                    <h2>Data</h2>
                    <p>Some data about Nigeria...</p>
                </div>
                <div class="card right-card">
                    <h2>Weather</h2>
                    <p>Temperature: <span id="temperature">28°C</span></p>
                    <p>Wind Speed: <span id="wind-speed">15 km/h</span></p>
                    <p id="windchill">Wind Chill: <span id="windchill-value"></span></p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="year"></span> Nigeria Project</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>
    <script src="/scripts/place.js" defer></script>
</body>

</html>
